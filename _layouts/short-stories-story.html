---
layout: default
---
<script>
  // Prevent default grid.js from initializing on short stories pages
  window.DISABLE_GRID = true;
</script>
<link rel="stylesheet" href="/css/short-stories.css">

<div class="ss-progress-bar" id="ss-progress"></div>
<article class="ss-story">
  <div class="ss-scanlines"></div>

  <header class="ss-story-header">
    <h1>{{ page.title }}</h1>
    <p class="ss-byline">by {{ page.author | default: "Jerad Bitner" }}</p>
    <div class="ss-story-header-meta">
      {% if page.genre %}
      <span class="ss-genre-tag">{{ page.genre }}</span>
      {% endif %}
      {% if page.reading_time %}
      <span class="ss-reading-time">{{ page.reading_time }} read</span>
      {% endif %}
    </div>
  </header>

  <!-- Desktop TOC (auto-generated by JS) -->
  <nav class="ss-toc" id="ss-toc" aria-label="Chapter navigation"></nav>

  <!-- Mobile TOC -->
  <div class="ss-toc-mobile">
    <button class="ss-toc-toggle" id="ss-toc-mobile-toggle">
      <span class="ss-toc-toggle-arrow">&#9660;</span> Chapters
    </button>
    <div class="ss-toc-mobile-list" id="ss-toc-mobile-list"></div>
  </div>

  <section class="ss-story-content">
    {% if page.cover %}
    <img src="{{ page.cover }}" alt="{{ page.title }} cover" class="ss-story-cover">
    {% endif %}
    {{ content }}
  </section>

  <footer class="ss-story-footer">
    <div class="ss-divider"></div>
    <a href="/short-stories/" class="ss-back-link">&larr; Back to Short Stories</a>
  </footer>
</article>

<script>
(function() {
  // Reading progress bar
  const progressBar = document.getElementById('ss-progress');
  const storyContent = document.querySelector('.ss-story-content');

  function updateProgress() {
    const contentTop = storyContent.offsetTop;
    const contentHeight = storyContent.offsetHeight;
    const windowHeight = window.innerHeight;
    const scrolled = window.scrollY - contentTop + windowHeight;
    const total = contentHeight + windowHeight;
    const pct = Math.min(Math.max(scrolled / total * 100, 0), 100);
    progressBar.style.width = pct + '%';
  }

  window.addEventListener('scroll', function() {
    requestAnimationFrame(updateProgress);
  });
  updateProgress();

  // Auto-generate TOC from h2 elements
  const headings = storyContent.querySelectorAll('h2');
  const tocDesktop = document.getElementById('ss-toc');
  const tocMobileList = document.getElementById('ss-toc-mobile-list');

  if (headings.length > 0) {
    var innerHtml = '<div class="ss-toc-inner"><p class="ss-toc-label">Chapters</p>';

    headings.forEach(function(h, i) {
      if (!h.id) h.id = 'chapter-' + (i + 1);
      // Use short label: just chapter number for desktop, full title for mobile
      var title = h.textContent.replace(/^Chapter \d+:\s*/, '');
      var num = i + 1;
      innerHtml += '<a href="#' + h.id + '">Ch. ' + num + ': ' + title + '</a>';
      tocMobileList.innerHTML += '<a href="#' + h.id + '">Chapter ' + num + ': ' + title + '</a>';
    });

    innerHtml += '</div>';
    tocDesktop.innerHTML = innerHtml;

    // Highlight active chapter on scroll
    var tocLinks = tocDesktop.querySelectorAll('a');
    window.addEventListener('scroll', function() {
      var current = '';
      headings.forEach(function(h) {
        if (window.scrollY >= h.offsetTop - 120) {
          current = h.id;
        }
      });
      tocLinks.forEach(function(link) {
        link.classList.toggle('active', link.getAttribute('href') === '#' + current);
      });
    });
  } else {
    tocDesktop.style.display = 'none';
    document.querySelector('.ss-toc-mobile').style.display = 'none';
  }

  // Mobile TOC toggle
  var mobileToggle = document.getElementById('ss-toc-mobile-toggle');
  mobileToggle.addEventListener('click', function() {
    mobileToggle.classList.toggle('open');
    tocMobileList.classList.toggle('open');
  });

  // Close mobile TOC when clicking a link
  tocMobileList.addEventListener('click', function(e) {
    if (e.target.tagName === 'A') {
      mobileToggle.classList.remove('open');
      tocMobileList.classList.remove('open');
    }
  });
})();
</script>
