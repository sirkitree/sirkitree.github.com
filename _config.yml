url: https://jeradbitner.com
name: Jerad Bitner
author: Jerad Bitner
description: Personal site and blog of Jerad Bitner, a developer, writer, and creative technologist exploring code, family, fiction, and the web.
language: en-US
license: https://creativecommons.org/licenses/by/4.0/
image: /assets/social-preview.svg

person:
  name: Jerad Bitner
  given_name: Jerad
  family_name: Bitner
  alternate_name: sirkitree
  description: Developer, writer, and creative technologist exploring code, family, fiction, and the web.
  job_title: Developer and Writer
  image: /assets/jerad-bio.png
  knows_about:
    - Web development
    - Drupal
    - JavaScript
    - AI-assisted coding
    - Creative writing
    - Interactive art
  same_as:
    - https://github.com/sirkitree
    - https://sirkitree.net
    - https://twitter.com/sirkitree
    - https://sketchfab.com/sirkitree

# Change markdown processor from redcarpet to kramdown
markdown: kramdown

# Add jekyll-paginate to plugins list if you're using pagination
plugins:
  - jekyll-paginate
  - jekyll-redirect-from

# Pagination settings
paginate: 5
paginate_path: "/page:num/"

future: false

# Site settings
timezone: America/New_York
encoding: utf-8

root: /
permalink: /:year/:month/:title/

exclude:
  - CLAUDE.md
  - DEVELOPMENT.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - README.md
  - QUANTUM_WEAVE_DESIGN_PLAN.md
  - memory-bank/
  - node_modules/
  - scripts/
  - venv/
  - .cursor/

#GitHub Overrides
# safe: true  # Disabled locally for pagination to work
lsi: false
